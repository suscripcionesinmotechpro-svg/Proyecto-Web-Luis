<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso Pacientes · Bajar Peso</title>
  <meta name="description" content="Portal de acceso para pacientes de Bajar Peso. Consulta tu historial, contacta con tu médico y gestiona tu tratamiento."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/pages.css"/>
</head>
<body>
<script>window.BASE_PATH='../';</script>
<div id="cookie-ph"></div>
<div id="nav-ph"></div>
<div id="mob-ph"></div>

<main>
<section class="page-hero centered" style="min-height:100vh;justify-content:center;padding:0">
  <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding-top:72px">
    <div style="width:100%;max-width:440px;display:flex;flex-direction:column;gap:2rem">
      <!-- Logo -->
      <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.5rem">
        <svg width="48" height="48" viewBox="0 0 40 40" fill="none" style="color:white">
          <path d="M28 10.5C25.6 8.1 20.5 8.3 19 11.5C18 13.6 19 15.9 17.4 18.2C15.4 21.2 10.2 21.8 7.7 19.2C5 16.5 7.1 13.4 4.4 10.6C0 6.2 -7 12 -3.5 17.8C-1 21.8 3.5 18.7 6.1 22.5C7.4 24.4 6.7 26.3 7.5 28.4C9 32.4 15.3 32.8 17.5 28.8C18.8 26.5 17.5 23.7 19.9 21.5C22 19.5 24.6 20.5 26.8 19.4C30 17.8 30.7 13.1 28 10.5Z" fill="currentColor" transform="translate(12,0) scale(0.75)"/>
          <circle cx="20" cy="5" r="4.5" fill="currentColor"/>
        </svg>
        <div style="font-size:1.35rem;font-weight:700">Bajar Peso</div>
        <div style="font-size:0.8rem;color: rgba(40,49,82,0.55)">Portal de Pacientes</div>
      </div>

      <!-- Login Form -->
      <div class="glass-card" style="padding:2.5rem">
        <h1 style="font-size:1.35rem;text-align:center;margin-bottom:0.5rem">Accede a tu cuenta</h1>
        <p style="text-align:center;font-size:0.875rem;color: rgba(40,49,82,0.65);margin-bottom:2rem">Gestiona tu tratamiento y consultas</p>
        <form id="loginForm" style="display:flex;flex-direction:column;gap:1.25rem">
          <div class="input-group">
            <label class="input-label" for="loginEmail">Correo electrónico</label>
            <input type="email" id="loginEmail" class="input-field" placeholder="tu@email.com" required autocomplete="email"/>
          </div>
          <div class="input-group">
            <label class="input-label" for="loginPwd">Contraseña</label>
            <input type="password" id="loginPwd" class="input-field" placeholder="••••••••" required autocomplete="current-password"/>
            <a href="#" style="font-size:0.8rem;color:var(--color-coral);text-align:right;display:block;margin-top:0.5rem">¿Olvidaste tu contraseña?</a>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:1rem;padding:0.875rem">Iniciar sesión</button>
        </form>
      </div>

      <!-- New patient -->
      <div style="text-align:center;display:flex;flex-direction:column;gap:0.75rem">
        <p style="font-size:0.875rem;color: rgba(40,49,82,0.65)">¿No eres paciente todavía?</p>
        <a href="evaluacion.html" class="btn btn-outline" style="width:100%;justify-content:center">Iniciar evaluación gratuita →</a>
      </div>

      <p style="text-align:center;font-size:0.75rem;color: rgba(40,49,82,0.45)">Tu acceso está protegido conforme al RGPD. Solo tú y tu médico pueden ver tus datos.</p>
    </div>
  </div>
</section>
</main>

<div id="footer-ph"></div>
<script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.23/bundled/lenis.min.js"></script>
<script src="../js/components.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/auth.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPwd').value;

  if (!email || !password) return;

  var btn = e.target.querySelector('button[type="submit"]');
  var origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Iniciando sesión...';

  window.BajarPesoAuth.signIn(email, password, function(err, result) {
    btn.disabled = false;
    btn.textContent = origText;

    if (err) {
      alert('Error de acceso: ' + err.message);
    } else {
      if (result.role === 'doctor') {
        window.location.href = 'admin/dashboard.html';
      } else {
        window.location.href = 'portal/dashboard.html';
      }
    }
  });
});
</script>
</body>
</html>
